databases:
  - name: ols-db
    databaseName: ols_db
    user: ols_user
    plan: free

services:
  - type: web
    name: ols-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ols-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "1440"
      - key: MAX_UPLOAD_MB
        value: "20"
      - key: CORS_ORIGINS
        value: '["http://localhost:3000"]'
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  - type: web
    name: ols-frontend
    runtime: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    healthCheckPath: /
    envVars:
      # Set this to the public URL of the deployed ols-backend service.
      # It is intentionally server-only; browsers use the same-origin proxy.
      - key: BACKEND_API_URL
        sync: false
