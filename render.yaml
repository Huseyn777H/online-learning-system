databases:
  - name: ols-db
    databaseName: ols_db
    user: ols_user
    plan: free

services:
  - type: web
    name: ols-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ols-db
          property: connectionString
      - key: REDIS_URL
        value: redis://localhost:6379/0
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "1440"
      - key: MAX_UPLOAD_MB
        value: "20"
      - key: CORS_ORIGINS
        value: '["http://localhost:3000"]'
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
